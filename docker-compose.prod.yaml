services:
  nginx:
    image: nginx:1.25-alpine
    container_name: museum_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - museum_network

  frontend:
    container_name: museum_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        REACT_APP_API_URL: /api
    restart: unless-stopped
    networks:
      - museum_network

  backend:
    container_name: museum_backend
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    env_file:
      - ./server/.env
      - ./server/museum/.env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      museum_db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - museum_network

  museum_db:
    container_name: museum_db
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db_dumps:/dump/
    env_file:
      - ./server/.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      start_period: 5s
      interval: 5s
      timeout: 3s
      retries: 15
    restart: unless-stopped
    networks:
      - museum_network

volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  museum_network:
    name: museum_prod_network
    driver: bridge
